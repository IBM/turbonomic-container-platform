apiVersion: metrics.turbonomic.io/v1alpha1
kind: PrometheusQueryMapping
metadata:
  name: my-query-mapping-name-here
spec:
  entities:
    - attributes:
        - isIdentifier: true
          labels:
            - namespace
            - name
          delimeter: "/"
          name: id
        - isIdentifier: false
          labels:
            - namespace
            - name
          delimeter: "/"
          name: openshiftVmName
      metrics:
        - queries:
            - promql: 'sum(rate(kubevirt_vmi_cpu_usage_seconds_total[10m])) BY (name, namespace) * 1000'
              type: used
          type: cpu
        - queries:
            - promql: 'kubevirt_vmi_memory_used_bytes/1000'
              type: used
          type: memory
        - queries:
            - promql: '(rate(kubevirt_vmi_network_receive_bytes_total[10m]) + rate(kubevirt_vmi_network_transmit_bytes_total[10m]))'
              type: used
          type: netThroughput
      type: container
    - attributes:
        - isIdentifier: true
          labels:
            - namespace
            - name
          delimeter: "/"
          name: id
        - isIdentifier: false
          labels:
            - namespace
            - name
          delimeter: "/"
          name: openshiftVmName
      metrics:
        - queries:
            - promql: 'sum(rate(kubevirt_vmi_cpu_usage_seconds_total[10m])) BY (name, namespace) * 1000'
              type: used
          type: cpu
        - queries:
            - promql: 'kubevirt_vmi_memory_used_bytes/1000'
              type: used
          type: memory
        - queries:
            - promql: '(rate(kubevirt_vmi_network_receive_bytes_total[10m]) + rate(kubevirt_vmi_network_transmit_bytes_total[10m]))'
              type: used
          type: netThroughput
      type: containerizedVirtualMachine
    - attributes:
        - isIdentifier: true
          label: instance
          name: id
        - isIdentifier: false
          label: instance
          name: openshiftNodeName
      metrics:
        - queries:
            - promql: 'node_network_speed_bytes/8000'
              type: capacity
            - promql: 'irate(node_network_transmit_bytes_total[10m]) + irate(node_network_receive_bytes_total[10m])'
              type: used
          type: netThroughput
      type: virtualMachine
